<!DOCTYPE html>
<html>
<head>
    <title>Room Entry Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            width: 50%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Room Entry Register</h1>

    <h3>Enter Your Details</h3>

    <input type="text" id="name" placeholder="Enter Name">

    <input type="number" id="age" placeholder="Enter Age">

    <input type="text" id="year" placeholder="Year of Study">

    <button onclick="addEntry()">Submit</button>

    <h3>Visitors List</h3>

    <table id="entryTable">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Year of Study</th>
        </tr>
    </table>

</div>

<script>

function addEntry() {

    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let year = document.getElementById("year").value;

    if(name === "" || age === "" || year === "") {
        alert("Please fill all fields");
        return;
    }

    let table = document.getElementById("entryTable");

    let row = table.insertRow(-1);

    row.insertCell(0).innerHTML = name;
    row.insertCell(1).innerHTML = age;
    row.insertCell(2).innerHTML = year;

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("year").value = "";
}

</script>

</body>
</html>
